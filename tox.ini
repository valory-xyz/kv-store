; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
; Most runtime deps auto-mirror from [project].dependencies. Listed here
; are range-form overrides for runtime deps where the package YAML uses
; a range expression — `aea-helpers check-dependencies` does
; string-strict matching so the form must agree on both sides. Plus
; lint-only werkzeug/attrs not in pyproject.
extra_deps =
    protobuf<7,>=5
    werkzeug>=3.1,<4
    attrs>=25,<26

[pytest]
; Opt in to tomte's canonical pytest defaults (integration/e2e markers,
; aea.* DeprecationWarning filter). Plugin is silent without this flag so
; non-fleet `tomte[black]` consumers don't get unexpected config injection.
tomte_defaults = true
; anchorpy 0.20.2 (pulled transitively via open-aea-ledger-solana since
; open-autonomy 0.21.20) ships a pytest plugin with a broken import that
; crashes pytest collection. Disable its pytest11 entry point.
addopts = -p no:pytest_anchorpy
; Per-repo runtime knobs that tomte's canonical plugin doesn't ship:
; verbose CLI log capture (kept since the pre-migration tox.ini set it
; explicitly), and pinned strict asyncio mode (default in pytest-asyncio
; 1.x but stated explicitly so a future major bump can't silently flip
; it to auto).
log_cli = 1
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
asyncio_mode = strict

[mypy]
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore

; kv_store_pb2.py is a generated protobuf module — no type stubs.
[mypy-packages.valory.protocols.kv_store.kv_store_pb2]
ignore_errors = True

; Repo-specific libs not covered by tomte's canonical mypy.ini.
[mypy-peewee.*]
ignore_missing_imports = True


[Authorized Packages]
; open-autonomy wheel metadata reports "Other/Proprietary"; actual license is Apache-2.0.
open-autonomy: ==0.21.22
; anchorpy / based58 / jsonalias: transitive deps via open-aea-ledger-solana
; (added by open-autonomy 0.21.20). All three ship under MIT per their
; GitHub repos but expose no PyPI License field, so PARANOID liccheck
; reports them UNKNOWN.
anchorpy: 0.20.2
based58: 0.1.1
jsonalias: 0.1.1
; httpx: pulled in via solana << anchorpy. uv resolves a 1.0.dev* build
; under prerelease = "allow"; that build's metadata ships no License field.
; httpx is BSD-3-Clause upstream. liccheck parses this block with
; `semantic_version` (SemVer), not PEP 440 — the pre-release suffix
; here is `-dev` (SemVer), not `.dev0` (PEP 440); the canonical
; PEP 440 form is rejected with `ValueError: Invalid simple block`.
httpx: >=1.0.0-dev,<2
; peewee MIT license — classifier missing on PyPI, liccheck reports UNKNOWN.
peewee: >=3.17
